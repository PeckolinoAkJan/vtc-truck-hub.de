name: Build Desktop Client (Windows Installer)

on:
  # Manueller Start über GitHub → Actions → "Run workflow"
  workflow_dispatch:
  # Automatisch bei Tags wie v1.0.0
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Windows-Installer bauen (NSIS Setup.exe)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup.exe + latest.yml als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: VTC-Hub-Setup
          path: |
            desktop-client/release/*Setup*.exe
            desktop-client/release/*Setup*.exe.blockmap
            desktop-client/release/latest.yml
          if-no-files-found: error

      - name: GitHub Release veröffentlichen (Setup.exe + latest.yml)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-client/release/*Setup*.exe
            desktop-client/release/*Setup*.exe.blockmap
            desktop-client/release/latest.yml
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
